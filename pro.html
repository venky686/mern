<!DOCTYPE html>
<html>
<head>
<title>Student Progress Tracker</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:10px;
width:520px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input{
width:90%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

.deleteBtn{
background:red;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#333;
color:white;
}

#tablePage{
display:none;
}

.subjectTag{
background:#e0e0e0;
padding:5px 10px;
margin:3px;
display:inline-block;
border-radius:5px;
}

</style>

</head>

<body>

<!-- FORM PAGE -->

<div class="container" id="formPage">

<h2>Student Progress Form</h2>

<input type="text" id="name" placeholder="Enter Student Name">

<br>

<!-- ONE SUBJECT INPUT -->

<input list="subjects" id="subjectInput" placeholder="Type or Select Subject">

<datalist id="subjects">
<option value="Mathematics">
<option value="Science">
<option value="English">
<option value="Computer">
</datalist>

<button onclick="addSubject()">Add Subject</button>

<br>

<div id="subjectDisplay"></div>

<br>

<input type="number" id="score" placeholder="Enter Score">

<br>

<button onclick="saveStudent()">Submit</button>

</div>


<!-- TABLE PAGE -->

<div class="container" id="tablePage">

<h2>Student Progress Table</h2>

<table>

<thead>
<tr>
<th>Index</th>
<th>Name</th>
<th>Subjects</th>
<th>Score</th>
<th>Grade</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<br>

<button onclick="goBack()">Add Another Student</button>

</div>


<script>

let students=[]
let selectedSubjects=[]

function getGrade(score){

if(score>=90) return "A"
else if(score>=75) return "B"
else if(score>=60) return "C"
else return "D"

}

/* ADD SUBJECT FROM SAME INPUT */

function addSubject(){

let subject=document.getElementById("subjectInput").value.trim()

if(subject==""){
alert("Enter subject")
return
}

selectedSubjects.push(subject)

displaySubjects()

document.getElementById("subjectInput").value=""

}

function displaySubjects(){

let display=document.getElementById("subjectDisplay")

display.innerHTML=""

selectedSubjects.forEach(function(sub){

display.innerHTML += "<span class='subjectTag'>"+sub+"</span>"

})

}

/* SAVE STUDENT */

function saveStudent(){

let name=document.getElementById("name").value.trim()
let score=parseInt(document.getElementById("score").value)

if(name=="" || selectedSubjects.length==0 || isNaN(score)){
alert("Please fill all fields")
return
}

let grade=getGrade(score)

students.push({
name:name,
subjects:selectedSubjects.join(", "),
score:score,
grade:grade
})

showTable()

}

/* SHOW TABLE */

function showTable(){

document.getElementById("formPage").style.display="none"
document.getElementById("tablePage").style.display="block"

let table=document.getElementById("studentTable")

table.innerHTML=""

students.forEach(function(s,index){

let row=
"<tr>"+
"<td>"+(index+1)+"</td>"+
"<td>"+s.name+"</td>"+
"<td>"+s.subjects+"</td>"+
"<td>"+s.score+"</td>"+
"<td>"+s.grade+"</td>"+
"<td><button class='deleteBtn' onclick='deleteStudent("+index+")'>Delete</button></td>"+
"</tr>"

table.innerHTML+=row

})

}

/* DELETE ROW */

function deleteStudent(index){

students.splice(index,1)

showTable()

}

/* GO BACK */

function goBack(){

document.getElementById("formPage").style.display="block"
document.getElementById("tablePage").style.display="none"

document.getElementById("name").value=""
document.getElementById("score").value=""
document.getElementById("subjectInput").value=""

selectedSubjects=[]
displaySubjects()

}

</script>

</body>
</html>
